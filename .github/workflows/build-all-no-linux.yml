name: Build All no Linux (bundle)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java (17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Read version from pubspec.yaml
        id: ver
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        id: apk
        shell: bash
        run: |
          set -e
          SRC_APK=$(ls -1 build/app/outputs/flutter-apk/*.apk | head -n 1)
          VERSION="${{ steps.ver.outputs.version }}"
          DEST_APK="AnimeShin-android-v${VERSION}.apk"
          cp "$SRC_APK" "$DEST_APK"
          echo "apk_path=$DEST_APK" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: AnimeShin-android
          path: ${{ steps.apk.outputs.apk_path }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Read version from pubspec.yaml
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content "pubspec.yaml" | Where-Object { $_ -match '^version:' } | ForEach-Object {
            ($_ -split ':')[1].Trim().Split(' ')[0]
          } | Select-Object -First 1)
          if (-not $v) { throw "Version not found in pubspec.yaml" }
          $v = $v.Split('+')[0]
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create ZIP from Release folder contents
        id: zip
        shell: pwsh
        run: |
          $sourceDir = "build/windows/x64/runner/Release"
          if (-not (Test-Path $sourceDir)) { throw "Source folder not found: $sourceDir" }

          $version = "${{ steps.ver.outputs.version }}"
          $zipFile = "AnimeShin-win-v$version.zip"

          if (Test-Path $zipFile) { Remove-Item $zipFile -Force }

          Compress-Archive -Path (Join-Path $sourceDir '*') -DestinationPath $zipFile -Force

          "zip_path=$zipFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: AnimeShin-windows
          path: ${{ steps.zip.outputs.zip_path }}

  build-macos-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare iOS no-codesign config
        shell: bash
        run: |
          {
            echo ""
            echo "CODE_SIGN_ENTITLEMENTS="
            echo "DEVELOPMENT_TEAM="
            echo "PROVISIONING_PROFILE_SPECIFIER="
            echo "CODE_SIGN_STYLE=Manual"
          } >> ios/Flutter/Release.xcconfig

      - name: Build iOS
        run: flutter build ios --no-codesign

      - name: Create IPA
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          rm -rf Payload
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "AnimeShin-ios-v${VERSION}.ipa" Payload

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package DMG (drag & drop)
        shell: bash
        run: |
          set -e
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)

          APP_SRC="build/macos/Build/Products/Release/AnimeShin.app"
          if [ ! -d "$APP_SRC" ]; then
            echo "ERROR: macOS app not found at $APP_SRC"
            ls -la build/macos/Build/Products/Release || true
            exit 1
          fi

          STAGE_DIR="build/macos/dmg/AnimeShin"
          rm -rf "build/macos/dmg"
          mkdir -p "$STAGE_DIR"

          ENTITLEMENTS_FILE="macos/Runner/Release.entitlements"
          if [ ! -f "$ENTITLEMENTS_FILE" ]; then
            echo "ERROR: entitlements file not found at $ENTITLEMENTS_FILE"
            exit 1
          fi

          cp -R "$APP_SRC" "$STAGE_DIR/AnimeShin.app"

          APP_BUNDLE="$STAGE_DIR/AnimeShin.app"

          if [ -d "$APP_BUNDLE/Contents/Frameworks" ]; then
            find "$APP_BUNDLE/Contents/Frameworks" -type d -name "*.framework" -print0 \
              | while IFS= read -r -d '' fw; do
                  codesign --force --sign - "$fw" || true
                done
            find "$APP_BUNDLE/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 \
              | while IFS= read -r -d '' lib; do
                  codesign --force --sign - "$lib" || true
                done
          fi

          codesign --force --sign - --entitlements "$ENTITLEMENTS_FILE" "$APP_BUNDLE"
          codesign --verify --deep --strict "$APP_BUNDLE"

          ENTITLEMENTS_DUMP=$(mktemp)
          codesign -d --entitlements :- "$APP_BUNDLE" > "$ENTITLEMENTS_DUMP" 2>/dev/null
          if ! grep -q "com.apple.security.files.user-selected.read-write" "$ENTITLEMENTS_DUMP"; then
            echo "ERROR: staged macOS app is missing user-selected file access entitlements"
            cat "$ENTITLEMENTS_DUMP"
            exit 1
          fi

          ln -s /Applications "$STAGE_DIR/Applications"

          RW_DMG="build/macos/dmg/AnimeShin-temp.dmg"
          DMG_NAME="AnimeShin-macos-v${VERSION}.dmg"
          rm -f "$RW_DMG" "$DMG_NAME"

          hdiutil create \
            -volname "AnimeShin" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDRW \
            -fs HFS+ \
            "$RW_DMG"

          ATTACH_OUTPUT=$(hdiutil attach "$RW_DMG" -readwrite -noverify -noautoopen)
          DEVICE=$(echo "$ATTACH_OUTPUT" | awk '/\/Volumes\/AnimeShin/{print $1; exit}')
          if [ -z "$DEVICE" ]; then
            echo "ERROR: failed to mount temporary DMG"
            echo "$ATTACH_OUTPUT"
            exit 1
          fi

          osascript <<'APPLESCRIPT'
          tell application "Finder"
            tell disk "AnimeShin"
              open
              tell container window
                set current view to icon view
                set toolbar visible to false
                set statusbar visible to false
                set bounds to {140, 140, 640, 360}
              end tell
              tell icon view options of container window
                set arrangement to not arranged
                set icon size to 88
                set text size to 13
              end tell
              set position of item "AnimeShin.app" of container window to {140, 95}
              set position of item "Applications" of container window to {360, 95}
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$DEVICE"

          hdiutil convert \
            "$RW_DMG" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o "$DMG_NAME"

          rm -f "$RW_DMG"

          echo "Created $DMG_NAME"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: AnimeShin-ios
          path: AnimeShin-ios-v*.ipa

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: AnimeShin-macos
          path: AnimeShin-macos-v*.dmg

  package-all:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos-ios]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version from pubspec.yaml
        id: ver
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: AnimeShin-all
          path: dist/*